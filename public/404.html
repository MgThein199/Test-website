<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Nexus Library</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into a correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to refresh the page.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.lastIndexOf('/')) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="text/javascript">
      // This script will redirect to index.html with the current path as a query string
      location.replace(
        location.href.split(location.pathname)[0] + 
        location.pathname.substring(0, location.pathname.lastIndexOf('/')) + 
        '/index.html?/' + 
        location.pathname.slice(location.pathname.lastIndexOf('/') + 1).replace(/&/g, '~and~') + 
        (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
        location.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
